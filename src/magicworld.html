<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Magic World | Tendencias Globales</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .logo-berakah { font-family: 'Playfair Display', serif; letter-spacing: 0.15em; }
        .logo-magic { font-family: 'Dancing Script', cursive; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "background": "#fbf9f8",
                        "primary": "#0058bb",
                        "on-surface": "#1b1c1c",
                    },
                    fontFamily: { "body": ["Inter"] },
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body">
    <header class="w-full bg-[#fbf9f8] sticky top-0 z-50 border-b border-gray-100">
        <div class="flex flex-col w-full px-6 py-3 gap-4 max-w-[1440px] mx-auto">
            <div class="flex items-center justify-between">
                    <a href="../index.html" class="flex items-center gap-8 group pt-2 pb-2">
                        <span class="logo-berakah text-xl md:text-2xl font-bold text-black tracking-[0.15em] transition-all group-hover:text-primary">BERAKAH</span>
                        <div class="w-px h-8 bg-black/10"></div>
                        <span class="logo-magic text-2xl md:text-3xl text-[#FF2DCD] drop-shadow-[0_0_10px_rgba(255,45,205,0.3)]">Magic World</span>
                    </a>
                <div class="flex items-center gap-6">
                    <a href="checkout.html" class="material-symbols-outlined text-on-surface-variant relative">
                        shopping_cart
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-400 text-black text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
                    </a>
                </div>
            </div>
            <nav class="flex gap-16 text-lg font-medium tracking-tight">
                <a class="text-gray-600 hover:text-primary transition-colors" href="../index.html">Inicio</a>
                <a class="text-gray-600 hover:text-primary transition-colors" href="berakah.html">Artesanía</a>
                <a class="text-primary border-b-2 border-primary pb-1" href="magicworld.html">Tendencias</a>
            </nav>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-6 py-16">
        <div class="mb-20 text-center">
            <span class="logo-magic text-5xl md:text-7xl text-[#FF2DCD] block mb-8 drop-shadow-[0_0_20px_rgba(255,45,205,0.4)]">Magic World</span>
            <p class="text-xl text-on-surface-variant max-w-2xl mx-auto leading-relaxed font-light tracking-wide italic">El mundo digital curado. Descubre las últimas tendencias y colaboraciones exclusivas del entretenimiento global.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="brand-grid">
            <!-- Dinámico por main.js -->
        </div>
    </main>

    <footer class="border-t border-black/5 pt-20 pb-12 bg-white">
        <div class="max-w-[1440px] mx-auto px-6 flex flex-col items-center">
            <div class="flex items-center gap-8 mb-8 opacity-40 hover:opacity-100 transition-opacity">
                <span class="logo-berakah text-sm font-bold text-black tracking-[0.2em]">BERAKAH</span>
                <div class="w-px h-4 bg-black/10"></div>
                <span class="logo-magic text-base text-[#FF2DCD]">Magic World</span>
            </div>
            <div class="flex gap-12 text-sm text-gray-400 mb-16 font-medium">
                <a href="#" class="hover:text-black transition-colors">Términos</a>
                <a href="#" class="hover:text-black transition-colors">Privacidad</a>
                <a href="mailto:hola@magicworld.com" class="hover:text-black transition-colors">Contacto</a>
            </div>
            <p class="text-[10px] text-gray-300 uppercase tracking-[5px]">© 2026 Digital Luxury Collective. All Rights Reserved.</p>
        </div>
    </footer>

    <script>window.BRAND_FILTER = 'Magic World';</script>
    <script src="data.js"></script>
    <script src="main.js"></script>
    <script src="chatbot.js"></script>
