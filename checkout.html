<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Berakah | Magic World</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div class="container" style="max-width: 500px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;">
        <i data-lucide="check-circle" style="width: 60px; height: 60px; color: #00a650; margin-bottom: 20px;"></i>
        <h1 style="font-family: var(--font-heading); margin-bottom: 10px;">¡Gracias por tu compra!</h1>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 30px;">Tu pedido del Atelier está siendo procesado. Recibirás un correo con los detalles.</p>
        
        <button class="btn-add berakah" style="width: 100%;" onclick="location.href='index.html'">Volver al inicio</button>
    </div>

    <script>
        lucide.createIcons();
        gsap.from(".container", { opacity: 0, scale: 0.9, duration: 0.8, ease: "back.out(1.7)" });
    </script>
</body>
</html>
